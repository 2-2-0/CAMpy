<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 256" width="100%" height="100%">
  <!-- Definitions for gradients and glows -->
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#45475a" />
      <stop offset="100%" stop-color="#313244" />
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11111b" />
      <stop offset="100%" stop-color="#1e1e2e" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- App Icon Squircle Background -->
  <rect x="16" y="16" width="224" height="224" rx="52" fill="#1e1e2e" />

  <!-- Shutter Button Area -->
  <rect x="48" y="56" width="28" height="12" rx="4" fill="#f38ba8" />
  <rect x="52" y="48" width="20" height="8" rx="2" fill="#cdd6f4" />

  <!-- Camera Viewfinder / Flash bump -->
  <path d="M 76 80 L 92 56 L 164 56 L 180 80 Z" fill="#45475a" stroke="#11111b" stroke-width="4" stroke-linejoin="round"/>

  <!-- Flash Light -->
  <rect x="116" y="64" width="24" height="8" rx="4" fill="#cdd6f4" />

  <!-- Main Camera Body -->
  <rect x="32" y="80" width="192" height="132" rx="20" fill="url(#bodyGrad)" stroke="#11111b" stroke-width="4"/>

  <!-- Grip Lines -->
  <line x1="52" y1="100" x2="52" y2="190" stroke="#11111b" stroke-width="4" stroke-linecap="round" />
  <line x1="64" y1="100" x2="64" y2="190" stroke="#11111b" stroke-width="4" stroke-linecap="round" />

  <!-- Recording LED with Glow -->
  <circle cx="196" cy="104" r="6" fill="#f38ba8" filter="url(#glow)" />
  <circle cx="196" cy="104" r="3" fill="#ffffff" opacity="0.6" />

  <!-- Main Lens Outer Ring -->
  <circle cx="128" cy="146" r="56" fill="#313244" stroke="#cdd6f4" stroke-width="6" />

  <!-- Main Lens Inner Glass/Chamber -->
  <circle cx="128" cy="146" r="46" fill="url(#lensGrad)" stroke="#11111b" stroke-width="4" />

  <!-- Batch/Data Icons (Representing VAE training batches inside the lens) -->
  <rect x="100" y="118" width="22" height="22" rx="6" fill="#89b4fa" opacity="0.9" />
  <rect x="134" y="118" width="22" height="22" rx="6" fill="#a6e3a1" opacity="0.9" />
  <rect x="100" y="152" width="22" height="22" rx="6" fill="#f9e2af" opacity="0.9" />
  <rect x="134" y="152" width="22" height="22" rx="6" fill="#cba6f7" opacity="0.9" />

  <!-- Curved Lens Reflection/Glare -->
  <path d="M 96 114 A 46 46 0 0 1 160 114 A 50 50 0 0 0 96 114 Z" fill="#ffffff" opacity="0.15" />

  <!-- Side Branding -->
  <text x="280" y="220" font-family="sans-serif" font-weight="bold" font-size="260" fill="#313244" stroke="#cdd6f4" stroke-width="4" text-anchor="start" letter-spacing="-15">CAMpy</text>
</svg>